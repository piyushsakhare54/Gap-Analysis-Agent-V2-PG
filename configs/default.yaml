run:
  provider: heuristic
  temperature: 0
  allow_heuristic_fallback: true

agents:
  requirements_extractor:
    provider: heuristic
    model: heuristic
  solution_extractor:
    provider: heuristic
    model: heuristic
  gap_analyzer:
    provider: heuristic
    model: heuristic
  gap_critic:
    provider: heuristic
    model: heuristic

retrieval:
  embedding_provider: hashing
  embedding_model: BAAI/bge-m3
  top_k: 5
  min_score: 0.15
  chunk_max_lines: 40
  chunk_overlap_lines: 5
  gap_analysis_batch_size: 8
