run:
  provider: ollama
  temperature: 0
  allow_heuristic_fallback: false
  ollama_base_url: http://localhost:11434
  ollama_timeout_seconds: 3600
  ollama_think: false
  ollama_num_predict: 8192

agents:
  requirements_extractor:
    provider: ollama
    model: qwen3:8b
  solution_extractor:
    provider: ollama
    model: qwen3:8b
  gap_analyzer:
    provider: ollama
    model: qwen3:8b
  gap_critic:
    provider: ollama
    model: qwen3:8b

retrieval:
  embedding_provider: sentence_transformers
  embedding_model: BAAI/bge-m3
  top_k: 3
  min_score: 0.15
  chunk_max_lines: 35
  chunk_overlap_lines: 5
  gap_analysis_batch_size: 5
